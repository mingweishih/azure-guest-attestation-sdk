name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # --------------------------------------------------------------------------
  # Detect which files changed so we can skip expensive jobs on doc-only PRs.
  # Uses dorny/paths-filter — the de-facto standard for path-based filtering.
  # Skipped jobs still satisfy GitHub required-status-check rules.
  # --------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'tools/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  # --------------------------------------------------------------------------
  # Format check (fast, always runs)
  # --------------------------------------------------------------------------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # Clippy lint (per-platform, skipped on doc-only changes)
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy (${{ matrix.os }})
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # --------------------------------------------------------------------------
  # Build + unit tests (no vTPM, skipped on doc-only changes)
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace

  # --------------------------------------------------------------------------
  # vTPM integration tests (skipped on doc-only changes)
  # --------------------------------------------------------------------------
  vtpm-tests:
    name: vTPM tests (${{ matrix.os }})
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Perl is pre-installed on GitHub runners, but ensure Strawberry Perl
      # is available on Windows for the vendored OpenSSL build.
      - name: Install Strawberry Perl (Windows)
        if: runner.os == 'Windows'
        run: choco install strawberryperl --no-progress -y

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run vTPM tests (nextest)
        run: cargo nextest run -p azure-guest-attestation-sdk --features vtpm-tests

  # --------------------------------------------------------------------------
  # MSRV check (skipped on doc-only changes)
  # --------------------------------------------------------------------------
  msrv:
    name: MSRV (Rust 1.94)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  # --------------------------------------------------------------------------
  # Documentation build (skipped on doc-only changes — runs cargo doc)
  # --------------------------------------------------------------------------
  docs:
    name: Docs
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  # --------------------------------------------------------------------------
  # Code coverage (skipped on doc-only changes)
  # --------------------------------------------------------------------------
  coverage:
    name: Code Coverage
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests and check coverage threshold
        run: |
          cargo llvm-cov --workspace --features vtpm-tests \
            --ignore-filename-regex '(src/lib\.rs|azure-guest-attest/src/main\.rs)$' \
            --fail-under-lines 60

  # --------------------------------------------------------------------------
  # Security audit — check dependencies for known vulnerabilities
  # --------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # Dependency linting — license compliance & duplicate detection
  # --------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
