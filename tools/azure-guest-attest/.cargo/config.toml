# Cargo configuration for the azure-guest-attest tool

# Static CRT linking on Windows (MSVC)
# ======================================
# To enable static CRT linking when building with the "static" feature:
#
# Option 1: Set environment variable before building:
#   PowerShell:   $env:RUSTFLAGS="-Ctarget-feature=+crt-static"
#   CMD:          set RUSTFLAGS=-Ctarget-feature=+crt-static
#   Bash:         export RUSTFLAGS="-Ctarget-feature=+crt-static"
#
# Option 2: Uncomment the rustflags line below (applies to ALL builds):
#   [target.'cfg(all(target_os = "windows", target_env = "msvc"))']
#   rustflags = ["-Ctarget-feature=+crt-static"]
#
# Note: The build.rs script handles GNU/MinGW static linking automatically
# when the "static" feature is enabled.

[target.'cfg(all(target_os = "windows", target_env = "msvc"))']
rustflags = []
# Uncomment the line below to enable static CRT for all MSVC builds:
# rustflags = ["-Ctarget-feature=+crt-static"]

# Profile-specific configuration can be added here if needed
